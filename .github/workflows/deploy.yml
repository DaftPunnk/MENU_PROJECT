# 构建并部署到 GitHub Pages / build and deploy to GitHub Pages
# 每次 push 到 main 自动跑;产物是 Vite 打包出的 dist/
# Runs on every push to main; publishes the Vite production build in dist/.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允许 Actions 部署 Pages / permissions Pages deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署 / one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # 自动启用 Pages 并把源设为 GitHub Actions,省去手动开启
          # auto-enable Pages and set the source to GitHub Actions, no manual step needed
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
